    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;

        #header {
            width: 100%;
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border-bottom: 1px solid #c9a84c33;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;

        #header .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;

        #header .logo-area img {
            width: 40px;

            border-radius: 50%;
        }

        #header .logo-area .site-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #c9a84c;
        }

        #menu-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        #menu-container a {
            color: #e0e0e0;
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;

        #menu-container a:hover {

        }

        #tdg-balance {
            color: #c9a84c;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid #c9a84c55;
            border-radius: 4px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border: 1px solid #c9a84c33;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);

        h1 {
            font-size: 1.8rem;

            color: #a0a0b0;

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: bold;
            font-size: 0.95rem;
            color: #c9a84c;
        }

        select, input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #c9a84c55;
            background-color: #0f3460;
            color: #e0e0e0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
            outline: none;
            border-color: #c9a84c;
            box-shadow: 0 0 8px #c9a84c44;
        }

        select:disabled, input:disabled, textarea:disabled {
            background-color: #1a1a2e;
            cursor: not-allowed;
            opacity: 0.6;
        }

        select option {
            background-color: #16213e;
            color: #e0e0e0;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #c9a84c, #d4af37);
            color: #1a1a2e;
            transition: transform 0.15s, box-shadow 0.2s;
            margin: 1rem auto 0.5rem;
            width: 100%;
            max-width: 300px;
            display: block;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px #c9a84c66;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #payloadPreview {
            margin: 1rem 0;
            padding: 0.8rem;
            background-color: #0f3460;
            border: 1px solid #c9a84c55;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: #a0d0a0;
            display: none;
        }

        #txHashDisplay {
            margin: 1rem 0;
            padding: 0.6rem;
            background-color: #0f3460;
            border: 1px solid #c9a84c55;
            border-radius: 6px;
            font-size: 0.85rem;
            word-break: break-all;
            text-align: center;
            display: none;
        }

        #txHashDisplay .tx-label {
            font-weight: bold;
            color: #c9a84c;
        }

        #txHashDisplay .tx-value {
            font-family: monospace;
            color: #a0d0a0;
            font-size: 0.8rem;
        }

        .help-text {
            font-size: 0.8rem;
            color: #808090;
            margin-top: 0.25rem;
        }

        .signature-verify-status {
            margin: 1rem 0;
            min-height: 1.5rem;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
        }

        #welcome {
            text-align: center;
            color: #a0a0b0;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .card {
                padding: 1.2rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            #header {
                padding: 0.4rem 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="logo-area">
            <img src="https://github.com/TrueSightDAO/.github/blob/main/assets/20240612_truesight_dao_logo_square.png?raw=true" alt="TrueSight DAO">
            <span class="site-title">TrueSight DAO</span>
        </div>
        <div id="menu-container">
            <div id="tdg-balance">TDG: --</div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>Add Partner</h1>
            <div id="description">Onboard a new partner to the TrueSight DAO ecosystem. Partners can be farmer cooperatives, retailers, distributors, or other organizations.</div>

            <div id="status"></div>
            <div id="welcome"></div>

            <div id="signatureSection">
                <div class="form-row">
                    <label for="partnerName">Partner Name *</label>
                    <input type="text" id="partnerName" placeholder="e.g. Fazenda Boa Vista" autocomplete="off">
                </div>

                <div class="form-row">
                    <label for="partnerEmail">Email *</label>
                    <input type="email" id="partnerEmail" placeholder="e.g. contato@fazendabv.com.br" autocomplete="off">
                </div>

                <div class="form-row">
                    <label for="partnerType">Type *</label>
                    <select id="partnerType">
                        <option value="">Select type...</option>
                        <option value="Farmer Cooperative">Farmer Cooperative</option>
                        <option value="Retailer">Retailer</option>
                        <option value="Distributor">Distributor</option>
                        <option value="Processor">Processor</option>
                        <option value="NGO">NGO</option>
                        <option value="Research Institution">Research Institution</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="partnerAddress">Address</label>
                    <input type="text" id="partnerAddress" placeholder="e.g. Rua Principal, 100, Ilhéus, BA" autocomplete="off">
                </div>

                <div class="form-row">
                    <label for="partnerAbout">About</label>
                    <textarea id="partnerAbout" placeholder="e.g. Organic cacao producer, 50 hectares"></textarea>
                </div>

                <div class="form-row">
                    <label for="governorName">Governor Name *</label>
                    <select id="governorName">
                        <option value="">Select governor...</option>
                    </select>
                    <div class="help-text">Your name as the governor submitting this partner.</div>
                </div>

                <div id="payloadPreview"></div>

                <button id="submitBtn" onclick="signAndSubmit()">Sign &amp; Submit</button>

                <div id="txHashDisplay">
                    <span class="tx-label">Transaction Hash:</span>
                    <span class="tx-value" id="txHashValue"></span>
                </div>

                <div class="signature-verify-status" id="sigVerifyStatus"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let keyPair = null;

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const menuContainer = document.getElementById('menu-container');
                if (typeof renderMenu === 'function') {
                    renderMenu(menuContainer);
                }
            } catch(e) {
                console.log('Menu render deferred:', e.message);
            }

            try {
                if (typeof updateBalanceDisplay === 'function') {
                    updateBalanceDisplay();
                }
            } catch(e) {
                console.log('Balance display deferred:', e.message);
            }

            try {
                const stored = localStorage.getItem('truesight_dao_identity');
                if (stored) {
                    const identity = JSON.parse(stored);
                    currentUser = identity.email || identity.name || 'User';
                    document.getElementById('welcome').textContent = 'Welcome, ' + currentUser;
                }
            } catch(e) {
                console.log('Identity load deferred:', e.message);
            }

            try {
                const storedKey = localStorage.getItem('truesight_dao_keypair');
                if (storedKey) {
                    keyPair = JSON.parse(storedKey);
                }
            } catch(e) {
                console.log('Keypair load deferred:', e.message);
            }

            const inputs = ['partnerName', 'partnerEmail', 'partnerType', 'partnerAddress', 'partnerAbout', 'governorName'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updatePreview);
                if (el && el.tagName === 'SELECT') el.addEventListener('change', updatePreview);
            });

            // Populate governor dropdown from stored identities
            try {
                const governorSelect = document.getElementById('governorName');
                const storedIdentities = localStorage.getItem('truesight_dao_identities');
                const identities = storedIdentities ? JSON.parse(storedIdentities) : [];
                const stored = localStorage.getItem('truesight_dao_identity');
                if (stored) {
                    const identity = JSON.parse(stored);
                    if (!identities.some(i => i.email === identity.email)) {
                        identities.push(identity);
                    }
                }
                if (identities.length > 0) {
                    identities.forEach(identity => {
                        const opt = document.createElement('option');
                        opt.value = identity.name || identity.email || 'Unknown';
                        opt.textContent = (identity.name || 'Unknown') + ' (' + (identity.email || '') + ')';
                        governorSelect.appendChild(opt);
                    });
                    if (identities.length === 1) {
                        governorSelect.value = identities[0].name || identities[0].email || '';
                    }
                } else if (stored) {
                    const identity = JSON.parse(stored);
                    const opt = document.createElement('option');
                    opt.value = identity.name || identity.email || 'User';
                    opt.textContent = (identity.name || 'User') + ' (' + (identity.email || '') + ')';
                    governorSelect.appendChild(opt);
                    governorSelect.value = opt.value;
                }
            } catch(e) {
                console.log('Identity load deferred:', e.message);
            }

            updatePreview();
        });

        function getPayload() {
            return {
                event: '[PARTNER ADD EVENT]',
                partner_name: document.getElementById('partnerName').value.trim(),
                partner_email: document.getElementById('partnerEmail').value.trim(),
                partner_type: document.getElementById('partnerType').value,
                partner_address: document.getElementById('partnerAddress').value.trim(),
                partner_about: document.getElementById('partnerAbout').value.trim(),
                governor_name: document.getElementById('governorName').value.trim()
            };
        }

        function updatePreview() {
            const payload = getPayload();
            const preview = document.getElementById('payloadPreview');
            const hasData = Object.values(payload).some(v => v !== '' && v !== null && v !== undefined);
            if (hasData) {
                preview.style.display = 'block';
                preview.textContent = JSON.stringify(payload, null, 2);
            } else {
                preview.style.display = 'none';
            }
        }

        async function signAndSubmit() {
            const status = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const sigStatus = document.getElementById('sigVerifyStatus');
            const txDisplay = document.getElementById('txHashDisplay');
            const txValue = document.getElementById('txHashValue');

            status.className = '';
            status.textContent = '';
            sigStatus.textContent = '';
            txDisplay.style.display = 'none';

            const payload = getPayload();

            if (!payload.partner_name || !payload.partner_email || !payload.partner_type || !payload.governor_name) {
                status.className = 'error';
                status.textContent = 'Please fill in all required fields (*).';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            status.className = '';
            status.textContent = 'Signing payload...';

            try {
                let signature = null;
                let publicKeyPem = null;

                if (keyPair && keyPair.privateKey && keyPair.publicKey) {
                    const encoder = new TextEncoder();
                    const data = encoder.encode(JSON.stringify(payload));
                    const cryptoKey = await crypto.subtle.importKey(
                        'pkcs8',
                        strToAb(keyPair.privateKey),
                        { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
                        false,
                        ['sign']
                    );
                    const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, data);
                    signature = btoa(String.fromCharCode(...new Uint8Array(sig)));
                    publicKeyPem = keyPair.publicKey;
                    sigStatus.textContent = 'Signature generated';
                    sigStatus.className = 'signature-verify-status status';
                } else {
                    sigStatus.textContent = 'No keypair found. Submitting without signature (sandbox mode).';
                    sigStatus.className = 'signature-verify-status';
                }

                status.textContent = 'Submitting to Edgar...';

                const routes = window.ROUTES || {};
                const edgarUrl = routes.EDGAR_API || 'https://edgar.truesight.me';

                const response = await fetch(edgarUrl + '/dao/submit_contribution', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event_name: 'CONTRIBUTION EVENT',
                        attributes: payload,
                        signature: signature,
                        public_key: publicKeyPem
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    status.className = 'status';
                    status.textContent = 'Partner added successfully!';
                    if (result.tx_hash) {
                        txDisplay.style.display = 'block';
                        txValue.textContent = result.tx_hash;
                    }
                    submitBtn.textContent = 'Submitted';
                } else {
                    status.className = 'error';
                    status.textContent = 'Error: ' + (result.error || result.message || 'Unknown error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign & Submit';
                }
            } catch(e) {
                status.className = 'error';
                status.textContent = 'Error: ' + e.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign & Submit';
            }
        }

        function strToAb(str) {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }
    </script>
</body>
</html>
