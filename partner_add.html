    <style>

        }
        #txHashDisplay {
            margin: 1rem 0;
            padding: 0.6rem;

        }
        #txHashDisplay .tx-value {

        #submissionResult {
            margin: 1.5rem 0;

        }
        #submissionResult h3 {

</head>
<body>
    <div id="navDropdown" style="margin:1rem 0; text-align:center;"></div>
    <div id="tdgBalanceBadge"></div>
    <div class="container">
        <div style="text-align: center;">
            <img id="logo" height="200px" src="https://github.com/TrueSightDAO/.github/blob/main/assets/20240612_truesight_dao_logo_square.png?raw=true" alt="TrueSight DAO Logo"/>
        </div>

        <h1>Add Partner</h1>
        <p id="description">Onboard a new partner to the TrueSight DAO ecosystem. Partners can be farmer cooperatives, retailers, distributors, or other organizations.</p>

        <div id="status" aria-live="polite"></div>
        <div id="welcome"></div>

        <div class="form-row">
            <label for="partnerName">Partner Name *</label>
            <input type="text" id="partnerName" placeholder="e.g. Fazenda Boa Vista" autocomplete="off">
        </div>

        <div class="form-row">
            <label for="partnerEmail">Email *</label>
            <input type="email" id="partnerEmail" placeholder="e.g. contato@fazendabv.com.br" autocomplete="off">
        </div>

        <div class="form-row">
            <label for="partnerType">Type *</label>
            <select id="partnerType">
                <option value="">Select type...</option>
                <option value="farmer_cooperative">Farmer Cooperative</option>
                <option value="retailer">Retailer</option>
                <option value="distributor">Distributor</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-row">
            <label for="partnerAddress">Address</label>
            <input type="text" id="partnerAddress" placeholder="e.g. Rua Principal, 123, Itabuna, BA" autocomplete="off">
        </div>

        <div class="form-row">
            <label for="partnerAbout">About</label>
            <textarea id="partnerAbout" placeholder="Brief description of the partner organization..."></textarea>
        </div>

        <div id="payloadPreview"></div>

        <button id="submitBtn" disabled>Sign &amp; Submit</button>

        <div id="txHashDisplay">
            <span class="tx-label">Transaction Hash:</span>
            <span class="tx-value" id="txHashValue"></span>
        </div>

        <div id="submissionResult">
            <h3>Transaction request</h3>
            <pre id="requestPre"></pre>
            <h3>Edgar response</h3>
            <pre id="responsePre"></pre>
        </div>

        <div class="signature-verify-status" id="sigStatus"></div>
    </div>

    <script>
        (function() {
            const ROUTES = window.ROUTES || {};
            const EDGAR_URL = ROUTES.EDGAR_URL || 'https://edgar.truesight.me';

            const partnerName = document.getElementById('partnerName');
            const partnerEmail = document.getElementById('partnerEmail');
            const partnerType = document.getElementById('partnerType');
            const partnerAddress = document.getElementById('partnerAddress');
            const partnerAbout = document.getElementById('partnerAbout');
            const submitBtn = document.getElementById('submitBtn');
            const statusEl = document.getElementById('status');
            const payloadPreview = document.getElementById('payloadPreview');
            const txHashDisplay = document.getElementById('txHashDisplay');
            const txHashValue = document.getElementById('txHashValue');
            const submissionResult = document.getElementById('submissionResult');
            const requestPre = document.getElementById('requestPre');
            const responsePre = document.getElementById('responsePre');
            const sigStatus = document.getElementById('sigStatus');
            const welcome = document.getElementById('welcome');

            // Resolve governor name from stored identity

            // Show welcome message if identity is stored
            const storedIdentity = localStorage.getItem('truesight_dao_identity');
            if (storedIdentity) {
                try {
                    const identity = JSON.parse(storedIdentity);
                    if (identity.name) {
                        welcome.textContent = 'Welcome, ' + identity.name;
                        welcome.style.display = 'block';
                    }
                } catch(e) {}
            }

            // Resolve governor name from stored identity
            function getGovernorName() {
                try {
                    const stored = localStorage.getItem('truesight_dao_identity');
                    if (stored) {
                        const identity = JSON.parse(stored);
                        return identity.name || identity.email || '';
                    }
                } catch(e) {}
                return '';
            }

            // Enable submit when all required fields are filled
            function checkForm() {
                const valid = partnerName.value.trim() &&
                    partnerEmail.value.trim() &&
                    partnerType.value &&
                    getGovernorName();
                submitBtn.disabled = !valid;
                updatePreview();
            }

            [partnerName, partnerEmail, partnerType, partnerAddress, partnerAbout].forEach(function(el) {
                el.addEventListener('input', checkForm);
                el.addEventListener('change', checkForm);
            });

            function updatePreview() {
                if (!partnerName.value.trim() || !partnerEmail.value.trim() || !partnerType.value || !getGovernorName()) {
                    payloadPreview.style.display = 'none';
                    return;
                }
                const payload = buildPayload();
                payloadPreview.textContent = payload;
                payloadPreview.style.display = 'block';
            }

            function buildPayload() {
                return '[PARTNER ADD EVENT]\n' +
                    'Partner Name: ' + partnerName.value.trim() + '\n' +
                    'Email: ' + partnerEmail.value.trim() + '\n' +
                    'Type: ' + partnerType.value + '\n' +
                    (partnerAddress.value.trim() ? 'Address: ' + partnerAddress.value.trim() + '\n' : '') +
                    (partnerAbout.value.trim() ? 'About: ' + partnerAbout.value.trim() + '\n' : '') +
                    'Governor Name: ' + getGovernorName();
            }

            submitBtn.addEventListener('click', async function() {
                const payload = buildPayload();
                statusEl.textContent = 'Submitting...';
                statusEl.className = '';
                submitBtn.disabled = true;
                sigStatus.textContent = '';
                submissionResult.style.display = 'none';

                try {
                    // Try RSA signing if available
                    let signedPayload = payload;
                    let signatureInfo = '';
                    try {
                        const stored = localStorage.getItem('truesight_dao_identity');
                        if (stored) {
                            const identity = JSON.parse(stored);
                            if (identity.privateKey && window.crypto && window.crypto.subtle) {
                                const enc = new TextEncoder();
                                const keyData = enc.encode(identity.privateKey);
                                const key = await crypto.subtle.importKey(
                                    'pkcs8', keyData,
                                    { name: 'RSA-PSS', hash: 'SHA-256' },
                                    false, ['sign']
                                );
                                const sig = await crypto.subtle.sign(
                                    { name: 'RSA-PSS', saltLength: 32 },
                                    key, enc.encode(payload)
                                );
                                const sigB64 = btoa(String.fromCharCode.apply(null, new Uint8Array(sig)));
                                signatureInfo = '\nMy Digital Signature: ' + sigB64;
                                sigStatus.textContent = 'Signature verified';
                                sigStatus.style.color = '#28a745';
                            }
                        }
                    } catch(e) {
                        console.log('RSA signing not available, submitting unsigned:', e);
                        sigStatus.textContent = 'Note: Submitting without cryptographic signature';
                        sigStatus.style.color = '#856404';
                    }

                    const txId = 'TX' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substring(2, 6).toUpperCase();
                    const shareText = payload + signatureInfo + '\nRequest Transaction ID: ' + txId +
                        '\n(generated using https://dapp.truesight.me/partner_add.html)' +
                        '\nVerify submission here: ' + EDGAR_URL;

                    // Show the signed share text
                    requestPre.textContent = shareText;

                    const response = await fetch(EDGAR_URL + '/dao/submit_contribution', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: shareText,
                            source: 'dapp_partner_add'
                        })
                    });

                    let result;
                    try {
                        result = await response.json();
                    } catch(e) {
                        result = { raw: await response.text() };
                    }

                    responsePre.textContent = JSON.stringify(result, null, 2);
                    submissionResult.style.display = 'block';

                    txHashValue.textContent = txId;
                    txHashDisplay.style.display = 'block';

                    if (response.ok) {
                        statusEl.textContent = 'Partner added successfully!';
                        statusEl.className = 'status';
                    } else {
                        statusEl.textContent = 'Submission completed (check response below)';
                        statusEl.className = '';
                    }
                } catch(err) {
                    statusEl.textContent = 'Error: ' + err.message;
                    statusEl.className = 'error';
                } finally {
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
